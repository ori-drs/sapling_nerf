services:
  sapling_nerf:
    container_name: sapling_nerf_container
    build:
      context: ..
      dockerfile: .docker/Dockerfile
      args:
        - UID=${UID}
        - GID=${GID}
        - USERNAME=${USERNAME}
        - DOCKER_WORKDIR=${DOCKER_WORKDIR}
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    runtime: nvidia
    network_mode: "host"
    tty: true
    volumes:
      - ..:${DOCKER_WORKDIR}
      - ${HOST_DATA_DIR}:${DOCKER_DATA_DIR}